<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preferente Benjamín F7 — Grupo 12</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-content">
        <i data-lucide="trophy" class="header-icon"></i>
        <div class="header-text">
          <h1>Grupo 12</h1>
          <p class="header-sub">Preferente Benjamín F7 · 2025-2026</p>
        </div>
        <span class="season-badge">RFFM</span>
      </div>
    </header>

    <main class="main">
      <div class="panels" id="panels" style="display:none">
        <section class="panel glass" id="panel-clasificacion">
          <h2><i data-lucide="list-ordered"></i> Clasificación</h2>
          <div class="table-scroll" id="clasificacion-body"></div>
        </section>

        <section class="panel glass" id="panel-resultados">
          <h2><i data-lucide="calendar-days"></i> Resultados</h2>
          <div class="jornada-nav">
            <button id="jornada-prev" class="btn-nav" aria-label="Jornada anterior">&#8592;</button>
            <span id="jornada-label">Jornada 1</span>
            <button id="jornada-next" class="btn-nav" aria-label="Jornada siguiente">&#8594;</button>
          </div>
          <div id="resultados-body"></div>
        </section>
      </div>

      <section class="panel glass goleadores-panel" id="panel-goleadores" style="display:none">
        <h2><i data-lucide="award"></i> Goleadores</h2>
        <div class="table-scroll" id="goleadores-body"></div>
      </section>

      <div id="loading" class="loading-msg"><span class="spinner"></span> Cargando datos...</div>
      <div id="error-msg" class="error-msg" style="display:none"></div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
