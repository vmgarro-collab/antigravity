name: Scrape Liga Veteranos

on:
  schedule:
    - cron: '0 * * * *'  # cada hora
  workflow_dispatch:       # disparo manual desde GitHub

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 lxml

      - name: Ejecutar scraper
        run: python F-6/scrape.py

      - name: Commit datos actualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add F-6/data/
          git diff --staged --quiet || git commit -m "data: actualizar datos liga veteranos [skip ci]"
          git push