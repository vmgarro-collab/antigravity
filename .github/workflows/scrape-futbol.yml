name: Scrape Futbol Benjamines

on:
  schedule:
    - cron: '0 7,13,19 * * 0-5'  # domingo a viernes: 3 veces al día
    - cron: '0 8-20 * * 6'       # sábados: cada hora de 8h a 20h
  workflow_dispatch:             # disparo manual desde GitHub

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Ejecutar scraper
        run: node Futbol/scrape-static.js

      - name: Commit datos actualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Futbol/data/
          git diff --staged --quiet || git commit -m "data: actualizar datos benjamines [skip ci]"
          git pull --rebase
          git push