    function log_msg(text, className = '') {
      const line = document.createElement('div');
      if (className) line.className = className;
      line.textContent = text;
      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
    }

    async function seedAll() {
      seedBtn.disabled = true;
      log.innerHTML = '';

      log_msg(`Iniciando inserción de ${EVENTS.length} eventos...`, 'info');
      log_msg('');

      let ok = 0, err = 0;

      for (const ev of EVENTS) {
        try {
          await db.collection('events').add({
            title: ev.title,
            start: ev.start,
            assignees: ev.assignees,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          log_msg(`✓ ${ev.start} — ${ev.title}`, 'ok');
          ok++;
        } catch(e) {
          log_msg(`✗ ${ev.start} — ${ev.title}: ${e.message}`, 'err');
          err++;
        }
      }

      log_msg('');
      const summary = document.createElement('div');
      summary.className = 'summary';
      summary.innerHTML = `<strong>Proceso completado:</strong><br>
        <span class="ok">✓ ${ok} eventos insertados correctamente</span><br>
        ${err > 0 ? `<span class="err">✗ ${err} errores</span>` : '<span class="ok">Sin errores</span>'}`;
      log.appendChild(summary);

      seedBtn.disabled = false;
    }
